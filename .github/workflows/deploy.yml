name: Despliegue a Azure
on:
  push:
    branches: ¨[ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Desplegar Bicep
      uses: azure/arm-deploy@v1
      with:
        scope: subscription
        region: spaincentral
        template: ./main.bicep
        deploymentName: github-deploy-01
